name: Changeset Release

on:
  workflow_call:
    inputs:
      node-version-file:
        default: '.nvmrc'
        required: false
        type: string
      publish-script:
        default: 'pnpm release'
        required: false
        type: string
      version-script:
        default: 'pnpm changeset version'
        required: false
        type: string
      node-registry:
        required: false
        type: string
      node-registry-scope:
        required: false
        type: string
    secrets:
      client_id:
        required: true
      private_key:
        required: true
      npm-token:
        required: true

jobs:
  release:
    name: changeset-release
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - name: Get App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: get_token
        with:
          client-id: ${{ secrets.client_id }}
          private-key: ${{ secrets.private_key }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.get_token.outputs.token }}

      - name: Setup PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: 'pnpm'
          registry-url: ${{ inputs.node-registry }}
          scope: ${{ inputs.node-registry-scope }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@e4156907cdd269dcaa37f03263be504a3570994d # v1.6.0
        with:
          commit: 'chore(release): Bump package version'
          title: '📦 Release New Version'
          createGithubReleases: true
          version: ${{ inputs.version-script }}
          publish: ${{ inputs.publish-script }}
        env:
          GITHUB_TOKEN: ${{ steps.get_token.outputs.token }}
          HOME: ${{ github.workspace }}
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}
