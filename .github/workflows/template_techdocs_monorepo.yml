name: TechDocs

on:
  workflow_call:
    secrets:
      azure-account-name:
        required: true
      azure-account-key:
        required: true
jobs:
  techdocs:
    name: TechDocs
    runs-on: ubuntu-slim
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install techdocs-cli
        run: sudo npm install -g @techdocs/cli

      - name: Install mkdocs and mkdocs plugins
        run: |
          python -m pip install mkdocs-techdocs-core==1.* mkdocs-awesome-pages-plugin==2.* mkdocs-awesome-nav==3.0.0

      - name: Generate and Publish TechDocs
        run: |
          # Determine which components changed in this push. We default to a full
          # publish and only narrow to the changed components when we can reliably
          # compute the diff. This keeps the job runtime proportional to the change
          # set instead of the (ever growing) number of components in the repo.
          INCREMENTAL=0
          CHANGED=""
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "${{ github.event_name }}" = "push" ] \
            && [ -n "$BEFORE" ] \
            && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            if git fetch --no-tags --depth=1 origin "$BEFORE" >/dev/null 2>&1; then
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
              INCREMENTAL=1
            else
              echo "⚠️  Could not fetch base commit $BEFORE - publishing all components"
            fi
          else
            echo "ℹ️  Non-incremental trigger (${{ github.event_name }}) - publishing all components"
          fi

          # A change to the workflow or to the repo-root mkdocs.yml can affect every
          # component, so fall back to a full publish in those cases.
          if [ "$INCREMENTAL" = "1" ] \
            && printf '%s\n' "$CHANGED" | grep -qE '^[.]github/|^mkdocs[.]yml$'; then
            echo "ℹ️  Global change detected (workflow or root mkdocs.yml) - publishing all components"
            INCREMENTAL=0
          fi

          if [ "$INCREMENTAL" = "1" ]; then
            echo "🔎 Incremental publish - changed files:"
            printf '%s\n' "$CHANGED" | sed 's/^/    /'
          fi

          # Returns success when a changed file lives inside the given directory.
          dir_changed() {
            local dir="$1" f
            while IFS= read -r f; do
              case "$f" in "$dir"/*) return 0 ;; esac
            done <<< "$CHANGED"
            return 1
          }

          find . -name "catalog-info.yaml" -print0 | while read -r -d $'\0' file
          do
            echo ""
            echo "Working on $file"
            i="0"
            while true; do
              idx=$i
              i=$((i+1))

              # .kind is mandatory and can be used to check whether there is another document
              kind=$(yq e "select(documentIndex == $idx) | .kind" "$file")
              if [ -z "$kind" ]; then
                break
              fi

              name=$(yq e "select(documentIndex == $idx) | .metadata.name" "$file")
              # Only process documents with techdocs-ref annotation
              techDocsConfigured=$(yq e "select(documentIndex == $idx) | .metadata.annotations | has(\"backstage.io/techdocs-ref\")" "$file")
              if [ "$techDocsConfigured" == false ]; then
                  echo "  😥 Skip $kind/$name - TechDocs not configured"
                  continue
              fi

              fileDir=$(find "$file" -printf '%h' -quit)

              # On incremental runs, only (re)publish components whose directory changed.
              if [ "$INCREMENTAL" = "1" ] && ! dir_changed "${fileDir#./}"; then
                echo "  ⏭️  Skip $kind/$name - no documentation changes"
                continue
              fi

              echo "  📝 Publish TechDocs for $kind/$name"

              techdocs-cli generate \
                --no-docker \
                --verbose \
                --source-dir=$fileDir \
                --output-dir=$fileDir/site/ 1>/dev/null

              techdocs-cli publish \
                --directory=$fileDir/site/ \
                --publisher-type azureBlobStorage \
                --storage-name techdocs \
                --azureAccountName ${{ secrets.azure-account-name }} \
                --azureAccountKey ${{ secrets.azure-account-key }} \
                --entity default/$kind/$name 1>/dev/null
            done
          done
