# see: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions#enable-auto-merge-on-a-pull-request
name: Dependabot Auto-Merge

on:
  workflow_call:
    inputs:
      force:
        description: "When true (default), wait for all required status checks to pass, then merge with admin privileges to bypass the code-owner review. When false, use GitHub's standard auto-merge (`--auto`), which waits for all branch protection requirements including a human code-owner approval."
        default: true
        required: false
        type: boolean
      strategy:
        default: "squash"
        required: false
        type: string
      update-types:
        description: "Types of version update to allow (possible values are: minor, major, patch)"
        default: "patch,minor"
        required: false
        type: string
      include-pre-release:
        description: "Include pre-release updates"
        default: false
        required: false
        type: boolean
    secrets:
      app_id:
        required: true
      private_key:
        required: true

jobs:
  dependabot:
    name: auto-merge
    runs-on: ubuntu-slim
    permissions: {}
    if: github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
      - name: Get App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: get_token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.private_key }}

      - name: Load dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v3.0.0
        with:
          github-token: ${{ steps.get_token.outputs.token }}

      - name: Enable auto-merge for Dependabot PRs
        if: >-
          (
            inputs.include-pre-release ||
            !startsWith(steps.metadata.outputs.previous-version, '0.')
          ) &&
          (
            (
              contains(inputs.update-types, 'major') &&
              steps.metadata.outputs.update-type == 'version-update:semver-major'
            ) ||
            (
              contains(inputs.update-types, 'minor') &&
              steps.metadata.outputs.update-type == 'version-update:semver-minor'
            ) ||
            (
              contains(inputs.update-types, 'patch') &&
              steps.metadata.outputs.update-type == 'version-update:semver-patch'
            )
          )
        run: |
          gh pr review --approve "$PR_URL"

          MERGE_OPTIONS=()

          case "${{ inputs.strategy }}" in
            "rebase")
              MERGE_OPTIONS+=("--rebase")
              ;;
            "merge")
              MERGE_OPTIONS+=("--merge")
              ;;
            *)
              MERGE_OPTIONS+=("--squash")
              ;;
          esac

          if [ "${{ inputs.force }}" == 'true' ]; then
            echo "Waiting for required status checks before admin-merging..."
            gh pr checks "$PR_URL" --watch --required --fail-fast
            MERGE_OPTIONS+=("--admin")
          else
            MERGE_OPTIONS+=("--auto")
          fi

          echo "Executing merge command with the options: '${MERGE_OPTIONS[*]}'"
          gh pr merge "$PR_URL" "${MERGE_OPTIONS[@]}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ steps.get_token.outputs.token }}
