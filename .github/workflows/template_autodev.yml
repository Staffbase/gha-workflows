name: Autodev
on:
  workflow_call:
    inputs:
      base:
        default: 'main'
        required: false
        type: string
      branch:
        default: 'dev'
        required: false
        type: string
      comments:
        default: false
        required: false
        type: boolean
      email:
        default: 'staffbot@staffbase.com'
        required: false
        type: string
      failure_comment:
        required: false
        type: string
      failure_label:
        default: 'failed'
        required: false
        type: string
      label:
        default: 'dev'
        required: false
        type: string
      labels:
        default: false
        required: false
        type: boolean
      success_comment:
        required: false
        type: string
      success_label:
        default: 'successful'
        required: false
        type: string
      user:
        default: 'AutoDev Action'
        required: false
        type: string
    secrets:
      token:
        required: false
      client_id:
        required: false
      private_key:
        required: false

jobs:
  autodev:
    name: Build Dev Branch
    runs-on: ubuntu-slim
    permissions:
      contents: read

    # check to not trigger if dependabot did something or PR was closed or label is not the configured dev label
    if: github.actor != 'dependabot[bot]' && (github.event_name == 'push' || github.event.label.name == inputs.label || github.event.action == 'closed')

    env:
      USING_APP_CREDENTIALS: ${{ secrets.client_id != '' && secrets.private_key != '' }}

    steps:
      - name: Get App Token
        if: ${{ env.USING_APP_CREDENTIALS == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: get_token
        with:
          client-id: ${{ secrets.client_id }}
          private-key: ${{ secrets.private_key }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ env.USING_APP_CREDENTIALS == 'true' && steps.get_token.outputs.token || secrets.token }}
          fetch-depth: 0
          fetch-tags: false

      - name: Autodev
        uses: Staffbase/autodev-action@64d919840cdafe7acbf02f650c0ca73fd3ccc230 # v2.8.1
        with:
          base: ${{ inputs.base }}
          branch: ${{ inputs.branch }}
          comments: ${{ inputs.comments }}
          email: ${{ inputs.email }}
          failure_comment: ${{ inputs.failure_comment }}
          failure_label: ${{ inputs.failure_label }}
          label: ${{ inputs.label }}
          labels: ${{ inputs.labels }}
          success_comment: ${{ inputs.success_comment }}
          success_label: ${{ inputs.success_label }}
          token: ${{ env.USING_APP_CREDENTIALS == 'true' && steps.get_token.outputs.token || secrets.token }}
          user: ${{ inputs.user }}
